<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Careers Form Dashboard | DC Cloud Solutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(-45deg, #007bff, #6f42c1, #20c997, #ffc107);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      margin: 0;
      padding: 40px;
      color: #333;
    }

    @keyframes gradientBG {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    h2 {
      text-align: center;
      color: #222;
      margin-bottom: 25px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .btn {
      background-color: #6f42c1;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #56309b;
      transform: translateY(-2px);
    }

    .search-box {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .search-box input {
      width: 100%;
      max-width: 400px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }

    .table-container {
      overflow-x: auto;
      border-radius: 12px;
      background: #fafafa;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 900px;
    }

    thead {
      background: #6f42c1;
      color: #fff;
    }

    th,
    td {
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      text-align: left;
      white-space: nowrap;
    }

    tr:nth-child(even) {
      background: #fdfdfd;
    }

    tr:hover {
      background: #f3e9ff;
    }

    .done-row {
      background-color: #e0f7e9 !important;
    }

    .done-btn {
      background: #20c997;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .done-btn:hover {
      background: #17a589;
    }

    .done-label {
      color: #20c997;
      font-weight: 600;
    }

    .footer {
      text-align: center;
      margin-top: 25px;
      font-size: 13px;
      color: #555;
    }

    .footer span {
      color: #6f42c1;
      font-weight: 700;
    }
  </style>
  <link rel="stylesheet" href="components/layout.css">
</head>

<body>
  <!-- Main Content Wrapper injected by unified layout -->
  <main class="admin-main">
    <header class="admin-header">
      <h1 class="admin-header-title">Careers Form Dashboard</h1>
    </header>

    <div class="admin-content">
      <div class="admin-table-card">
        <div id="totalCount" style="text-align:center;font-weight:600;margin-bottom:15px;"></div>

        <div class="actions">
          <button class="btn" onclick="copyEmails()">📋 Copy All Emails</button>
          <button class="btn" onclick="emailAll()">✉️ Email All</button>
          <button class="btn" onclick="reloadData()">🔄 Refresh</button>
        </div>

        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search by name, email, position, etc...">
        </div>

        <div class="table-container">
          <table id="registrationTable">
            <thead>
              <tr>
                <th>Status</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Resume</th>
                <th>Timestamp</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr>
                <td colspan="10" style="text-align:center;">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
  </main>

  <!-- Unified Sidebar Injector -->
  <script src="components/sidebar.js"></script>

  <script>
    const API_URL = "https://sheetdb.io/api/v1/emo4fvdoutqkw";
    const tableBody = document.getElementById("tableBody");
    const searchInput = document.getElementById("searchInput");
    const countBox = document.getElementById("totalCount");
    let allEmails = [];
    let doneList = JSON.parse(localStorage.getItem("doneList_careers")) || [];

    async function loadData() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        countBox.innerHTML = `Total Submissions: <span style='color:#6f42c1'>${data.length}</span>`;

        tableBody.innerHTML = "";
        allEmails = [];

        data.forEach(row => {
          const name = row["name"] || row["Name"] || "";
          const email = row["email"] || row["Email"] || "";
          const phone = row["phone"] || row["Phone"] || "";
          const resume = row["resume"] || row["Resume"] || "";
          const timestamp = row["timestamp"] || row["Timestamp"] || "";

          const id = email.trim().toLowerCase();
          if (email) allEmails.push(email);

          const isDone = doneList.includes(id);
          const tr = document.createElement("tr");
          tr.className = isDone ? "done-row" : "";

          tr.innerHTML = `
            <td id="status-${id}">
              ${isDone ? `<span class='done-label'>✅ Done</span>` : `<button class='done-btn' onclick="markDone('${id}', this)">Mark as Done</button>`}
            </td>
            <td>${name}</td>
            <td>${email}</td>
            <td>${phone}</td>
            <td><a href="${resume}" target="_blank">Open</a></td>
            <td>${timestamp}</td>`;

          tableBody.appendChild(tr);
        });

      } catch (err) {
        tableBody.innerHTML = `<tr><td colspan="10" style="text-align:center;color:red;">Error loading data</td></tr>`;
      }
    }

    function markDone(id, btn) {
      if (!doneList.includes(id)) {
        doneList.push(id);
        localStorage.setItem("doneList_careers", JSON.stringify(doneList));
        const row = btn.closest("tr");
        row.classList.add("done-row");
        const statusCell = document.getElementById(`status-${id}`);
        statusCell.innerHTML = `<span class='done-label'>✅ Done</span>`;
      }
    }

    searchInput
