<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users | DC Admin</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="css/layout.css">
    <style>
        .admin-main {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        /* User Table Styles */
        .user-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .user-table th,
        .user-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .user-table th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #333;
        }

        .user-table tr:hover {
            background-color: #f8f9fa;
        }

        .action-btns button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
            margin-right: 4px;
            transition: background 0.2s;
        }

        .btn-edit {
            color: #1a73e8;
        }

        .btn-edit:hover {
            background: #e8f0fe;
        }

        .btn-delete {
            color: #dc3545;
        }

        .btn-delete:hover {
            background: #fce8e6;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: inherit;
        }

        /* Metrics Cards */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            border-left: 4px solid #1a73e8;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            color: #1a73e8;
            margin-bottom: 0.25rem;
        }

        .metric-label {
            color: #666;
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            background: white url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="%23999" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>') no-repeat 0.75rem center;
        }
    </style>
</head>

<body>

    <div class="admin-wrapper">
        <!-- Sidebar Container -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <div class="admin-main">
            <div class="header-actions">
                <div>
                    <h2><i class="fas fa-users"></i> Manage Users</h2>
                    <p style="color: #666; margin-top: 5px;">View and manage portal access</p>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="btnToggleView" class="btn btn-secondary" onclick="toggleView()" style="background-color: #666; color: white; border: none;">
                        <i class="fas fa-trash-restore"></i> Recently Deleted
                    </button>
                    <button class="btn btn-secondary" onclick="fetchUsers()">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                    <button class="btn btn-primary" id="btnAddUser" onclick="openAddModal()">
                        <i class="fas fa-user-plus"></i> Add User
                    </button>
                </div>
            </div>

            <!-- Metrics -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-value" id="metricTotalUsers">0</div>
                    <div class="metric-label">Total Users</div>
                </div>
                <div class="metric-card" style="border-left-color: #34a853;">
                    <div class="metric-value" id="metricTotalBatches" style="color: #34a853;">0</div>
                    <div class="metric-label">Active Batches</div>
                </div>
            </div>

            <!-- Search -->
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input"
                    placeholder="Search by name, email, or batch..." onkeyup="filterUsers()">
            </div>

            <table class="user-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Batch</th>
                        <th>Phone</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr>
                        <td colspan="5" style="text-align: center; color: #666;">Loading users from database...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit User Modal -->
    <div class="modal-overlay" id="userModal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top: 0; margin-bottom: 1.5rem;">Add New User</h3>
            <form id="userForm">
                <input type="hidden" id="originalEmail">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="userEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="text" id="userPassword" required>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="userName">
                </div>
                <div class="form-group">
                    <label>Batch Code</label>
                    <select id="userBatch" required>
                        <option value="" disabled selected>Loading batches...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="userPhone">
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save User</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/sidebar.js"></script>
    <script>
        // Check Auth
        if (sessionStorage.getItem('dc_admin_logged') !== '1') {
            window.location.href = 'index.html';
        }

        const firebaseConfig = {
            apiKey: "AIzaSyCohKlqNu0I1sXcLW4D_fv-OEw9x0S50q8",
            authDomain: "dc-infotechpvt-1-d1a4b.firebaseapp.com",
            databaseURL: "https://dc-infotechpvt-1-d1a4b-default-rtdb.firebaseio.com",
            projectId: "dc-infotechpvt-1-d1a4b",
            storageBucket: "dc-infotechpvt-1-d1a4b.firebasestorage.app",
            messagingSenderId: "622552457680",
            appId: "1:622552457680:web:4b80e21e14e2b8266f19d5"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
        const userTableBody = document.getElementById('userTableBody');
        const modal = document.getElementById('userModal');
        const form = document.getElementById('userForm');
        let currentView = 'active'; // 'active' or 'deleted'

        function encodeEmail(email) {
            return email.replace(/\./g, ',');
        }

        function toggleView() {
            const btn = document.getElementById('btnToggleView');
            const addBtn = document.getElementById('btnAddUser');
            const title = document.querySelector('h2');
            
            if (currentView === 'active') {
                currentView = 'deleted';
                btn.innerHTML = '<i class="fas fa-users"></i> Back to Active';
                btn.style.backgroundColor = '#1a73e8';
                addBtn.style.display = 'none';
                title.innerHTML = '<i class="fas fa-trash-alt"></i> Recently Deleted';
            } else {
                currentView = 'active';
                btn.innerHTML = '<i class="fas fa-trash-restore"></i> Recently Deleted';
                btn.style.backgroundColor = '#666';
                addBtn.style.display = 'block';
                title.innerHTML = '<i class="fas fa-users"></i> Manage Users';
            }
            fetchUsers();
        }

        // Fetch Batches for Dropdown
        function loadBatches() {
            const selectEl = document.getElementById('userBatch');
            selectEl.innerHTML = '<option value="">Loading batches...</option>';

            db.ref('agendas').once('value')
                .then(snapshot => {
                    const data = snapshot.val();
                    selectEl.innerHTML = '<option value="" disabled selected>Select a batch...</option>';

                    if (!data) return;

                    const batches = Object.keys(data).sort((a, b) => {
                        if (a === 'DEFAULT') return -1;
                        if (b === 'DEFAULT') return 1;
                        return a.localeCompare(b);
                    });

                    batches.forEach(batchId => {
                        const opt = document.createElement('option');
                        opt.value = batchId;
                        opt.textContent = batchId;
                        selectEl.appendChild(opt);
                    });

                    document.getElementById('metricTotalBatches').innerText = batches.length;
                })
                .catch(err => console.error("Error fetching batches:", err));
        }

        // Fetch & List
        function fetchUsers() {
            const node = currentView === 'active' ? 'users' : 'deleted_users';
            userTableBody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Refreshing...</td></tr>';
            
            db.ref(node).once('value')
                .then(snapshot => {
                    const data = snapshot.val();
                    userTableBody.innerHTML = '';

                    if (!data) {
                        userTableBody.innerHTML = `<tr><td colspan="5" style="text-align: center;">No ${currentView === 'active' ? '' : 'deleted '}users found in database.</td></tr>`;
                        if (currentView === 'active') {
                            document.getElementById('metricTotalUsers').innerText = '0';
                        }
                        return;
                    }

                    const users = Object.values(data);
                    if (currentView === 'active') {
                        document.getElementById('metricTotalUsers').innerText = users.length;
                    }

                    users.forEach(user => {
                        const tr = document.createElement('tr');
                        let actionButtons = '';
                        
                        if (currentView === 'active') {
                            actionButtons = `
                                <button class="btn-edit" onclick="openEditModal('${user.email}', '${user.name}', '${user.password}', '${user.batch}', '${user.phone}')" title="Edit User">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn-delete" onclick="deleteUser('${user.email}')" title="Delete User">
                                    <i class="fas fa-trash"></i>
                                </button>
                            `;
                        } else {
                            actionButtons = `
                                <button class="btn-edit" onclick="restoreUser('${user.email}')" title="Restore User" style="color: #34a853;">
                                    <i class="fas fa-undo"></i>
                                </button>
                                <button class="btn-delete" onclick="permanentDeleteUser('${user.email}')" title="Permanently Delete">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            `;
                        }

                        tr.innerHTML = `
                            <td>${user.name || '-'}</td>
                            <td>${user.email}</td>
                            <td><span style="background: #e8f0fe; color: #1a73e8; padding: 4px 8px; border-radius: 12px; font-size: 0.85rem; font-weight: 500;">${user.batch || '-'}</span></td>
                            <td>${user.phone || '-'}</td>
                            <td class="action-btns">
                                ${actionButtons}
                            </td>
                        `;
                        userTableBody.appendChild(tr);
                    });
                })
                .catch(err => {
                    console.error(err);
                    userTableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: red;">Error loading users.</td></tr>';
                });
        }

        // Modal Logic
        function openAddModal() {
            document.getElementById('modalTitle').innerText = 'Add New User';
            form.reset();
            document.getElementById('originalEmail').value = '';
            document.getElementById('userEmail').disabled = false;
            modal.classList.add('active');
        }

        function openEditModal(email, name, password, batch, phone) {
            document.getElementById('modalTitle').innerText = 'Edit User';

            document.getElementById('originalEmail').value = email;
            document.getElementById('userEmail').value = email;
            document.getElementById('userEmail').disabled = true; // Cannot edit email key easily without deleting
            document.getElementById('userPassword').value = password !== 'undefined' ? password : '';
            document.getElementById('userName').value = name !== 'undefined' ? name : '';
            document.getElementById('userBatch').value = batch !== 'undefined' ? batch : '';
            document.getElementById('userPhone').value = phone !== 'undefined' ? phone : '';

            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // Save Logic
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const email = document.getElementById('userEmail').value.trim();
            const originalEmail = document.getElementById('originalEmail').value;
            const isEdit = !!originalEmail;

            const userData = {
                email: email,
                password: document.getElementById('userPassword').value,
                name: document.getElementById('userName').value,
                batch: document.getElementById('userBatch').value,
                phone: document.getElementById('userPhone').value,
            };

            const encodedEmail = encodeEmail(email);

            // Optional: Show loading toast here

            db.ref(`users/${encodedEmail}`).set(userData)
                .then(() => {
                    closeModal();
                    Swal.fire({
                        icon: 'success',
                        title: 'Saved!',
                        text: `User ${email} has been ${isEdit ? 'updated' : 'added'}.`,
                        timer: 1500,
                        showConfirmButton: false
                    });
                    fetchUsers();
                })
                .catch(err => {
                    Swal.fire('Error', err.message, 'error');
                });
        });

        // Delete Logic
        function deleteUser(email) {
            Swal.fire({
                title: 'Delete User?',
                text: `Are you sure you want to remove ${email}? It will be moved to "Recently Deleted".`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                confirmButtonText: 'Yes, delete it'
            }).then((result) => {
                if (result.isConfirmed) {
                    const encodedEmail = encodeEmail(email);
                    
                    // First, get the user data
                    db.ref(`users/${encodedEmail}`).once('value')
                        .then(snapshot => {
                            const userData = snapshot.val();
                            if (!userData) throw new Error("User not found");
                            
                            // Move to deleted_users
                            return db.ref(`deleted_users/${encodedEmail}`).set(userData);
                        })
                        .then(() => {
                            // Then remove from users
                            return db.ref(`users/${encodedEmail}`).remove();
                        })
                        .then(() => {
                            Swal.fire('Deleted!', 'User moved to "Recently Deleted".', 'success');
                            fetchUsers();
                        })
                        .catch(err => Swal.fire('Error', err.message, 'error'));
                }
            });
        }

        function restoreUser(email) {
            const encodedEmail = encodeEmail(email);
            
            db.ref(`deleted_users/${encodedEmail}`).once('value')
                .then(snapshot => {
                    const userData = snapshot.val();
                    if (!userData) throw new Error("User not found in deleted list");
                    
                    // Move back to users
                    return db.ref(`users/${encodedEmail}`).set(userData);
                })
                .then(() => {
                    // Remove from deleted_users
                    return db.ref(`deleted_users/${encodedEmail}`).remove();
                })
                .then(() => {
                    Swal.fire('Restored!', 'User has been restored successfully.', 'success');
                    fetchUsers();
                })
                .catch(err => Swal.fire('Error', err.message, 'error'));
        }

        function permanentDeleteUser(email) {
            Swal.fire({
                title: 'Permanently Delete?',
                text: `This will completely remove ${email}. This action cannot be undone!`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Yes, delete forever'
            }).then((result) => {
                if (result.isConfirmed) {
                    const encodedEmail = encodeEmail(email);
                    db.ref(`deleted_users/${encodedEmail}`).remove()
                        .then(() => {
                            Swal.fire('Deleted!', 'User removed permanently.', 'success');
                            fetchUsers();
                        })
                        .catch(err => Swal.fire('Error', err.message, 'error'));
                }
            });
        }

        // Search Filter
        function filterUsers() {
            const input = document.getElementById("searchInput").value.toLowerCase();
            const trs = userTableBody.getElementsByTagName("tr");

            for (let i = 0; i < trs.length; i++) {
                // Skip the "Loading..." row if it exists
                if (trs[i].cells.length < 5) continue;

                const name = trs[i].cells[0].textContent.toLowerCase();
                const email = trs[i].cells[1].textContent.toLowerCase();
                const batch = trs[i].cells[2].textContent.toLowerCase();

                if (name.includes(input) || email.includes(input) || batch.includes(input)) {
                    trs[i].style.display = "";
                } else {
                    trs[i].style.display = "none";
                }
            }
        }

        // Initialize display
        loadBatches();
        fetchUsers();
    </script>
</body>

</html>
