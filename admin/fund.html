<style>
  body {
    font-family: 'Roboto', sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  .container {
    background-color: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    width: 80%;
    max-width: 500px;
    box-sizing: border-box;
    overflow: auto;
    max-height: 90vh;
  }

  h1 {
    text-align: center;
    color: #2c3e50;
    font-size: 1.5em;
  }

  .status {
    margin-top: 20px;
    text-align: center;
  }

  .status p {
    font-size: 1.2em;
    color: #7f8c8d;
  }

  .input-container {
    display: flex;
    flex-direction: column;
    margin-top: 20px;
  }

  .input-container input {
    padding: 10px;
    margin: 10px 0;
    font-size: 1em;
  }

  .welcome-message {
    text-align: center;
    margin-top: 20px;
    font-size: 1.2em;
    color: #2c3e50;
  }

  .loading {
    text-align: center;
    font-size: 1.5em;
    color: #3498db;
  }

  .fund-tracker {
    display: none;
  }

  button {
    padding: 10px;
    font-size: 1em;
    background-color: #3498db;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover {
    background-color: #2980b9;
  }

  .payment-list {
    max-height: 300px; /* Set a max height for the payment list */
    overflow-y: auto; /* Enable vertical scrolling */
    margin-top: 20px;
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 10px;
    background-color: #f9f9f9;
  }

  .payment-item {
    padding: 10px;
    margin-bottom: 10px;
    background-color: #ecf0f1;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  @media (max-width: 600px) {
    .container {
      width: 90%;
      padding: 20px;
    }

    h1 {
      font-size: 1.2em;
    }

    .status p, .welcome-message {
      font-size: 1em;
    }

    .input-container input {
      padding: 8px;
      font-size: 0.9em;
    }

    button {
      padding: 8px;
      font-size: 0.9em;
    }

    .payment-list {
      max-height: 200px; /* Adjust max height for smaller screens */
    }
  }
</style>


<body>
  <!-- Login Section -->
  <div id="loginContainer" class="container">
    <h1>Logins</h1>
    <form id="loginForm" class="login-form">
      <input type="email" id="email" placeholder="Enter your email" required />
      <input type="password" id="password" placeholder="Enter your password" required />
      <button type="submit">Login</button>
    </form>
  </div>

  <!-- Fund Tracker Section (Visible after login) -->
  <div id="fundTrackerContainer" class="container fund-tracker">
    <h1>DC Cloud Solutions Internship Fund Tracker</h1>
    <div id="welcomeMessage" class="welcome-message"></div>

    <div class="status">
      <p>Current Payment Status:</p>
      <p id="statusText">Loading...</p>
    </div>

    <div class="status">
      <p id="amountPaid">Current Balance : ₹0</p>
    
      </div>
      
    </div>
    <div id="paymentHistory" class="payment-list">
      <h3>Payment History:</h3>

  </div>
  <script src="pay.js"></script> <!-- Link to the external JavaScript file -->
  
</body>

</html>
