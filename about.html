<!DOCTYPE html>
<html>
<head>
    <title>About DC SafeBrowser</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            -webkit-app-region: drag; /* Allows moving the window by dragging anywhere */
        }
        .container {
            width: 85%;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .version {
            font-size: 14px;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 24px;
            display: inline-block;
        }
        h2 {
            font-weight: 600;
            margin: 0 0 16px 0;
            color: #f1f5f9;
        }
        p {
            font-size: 15px;
            line-height: 1.6;
            color: #cbd5e1;
            margin: 8px 0;
        }
        .contact-box {
            margin-top: 24px;
            padding: 16px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        .contact-box strong {
            color: #818cf8;
            display: block;
            margin-bottom: 4px;
        }
        .email {
            font-family: monospace;
            color: #38bdf8;
            text-decoration: none;
        }
        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #64748b;
        }
        .close-btn {
            margin-top: 24px;
            background: #6366f1;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            -webkit-app-region: no-drag;
        }
        .close-btn:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(99, 102, 241, 0.2);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }
        .blob-1 { top: -100px; left: -100px; }
        .blob-2 { bottom: -100px; right: -100px; }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <div class="logo">DC SafeBrowser</div>
        <div class="version">Version 1.1.7 (Hardened)</div>
        
        <h2>Developed by DC Infotech</h2>
        <p>DC Infotech Cloud Services &copy; 2026</p>

        <div style="margin: 15px 0; padding: 12px; background: rgba(34, 197, 94, 0.1); border-radius: 12px; border: 1px solid rgba(34, 197, 94, 0.2);">
            <p style="font-size: 14px; color: #4ade80; margin: 0; font-weight: 600;">
                <i class="fas fa-shield-halved"></i> System Hardened Active
            </p>
            <p style="font-size: 12px; color: #94a3b8; margin: 5px 0 0; line-height: 1.4;">
                Aggressive Background Lockdown Implemented.<br>
                Security Sweep Interval: 3 Seconds.
            </p>
        </div>
        
        <div class="contact-box">
            <strong>Need Support?</strong>
            <p>Dhiraj Chaudhari @sde</p>
            <a href="mailto:contact@dcinfotech.org.in" class="email">contact@dcinfotech.org.in</a>
        </div>

        <button class="close-btn" onclick="window.close()">Close Windows</button>
    </div>
</body>
</html>
