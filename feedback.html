<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Feedback Agent | DC Cloud Solutions</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .chat-container {
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 600px;
            background: #fff;
        }

        .chat-header {
            background: #0d6efd;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 15px;
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 20px;
            clear: both;
        }

        .message.agent {
            background: #e9ecef;
            color: #333;
            float: left;
            border-bottom-left-radius: 5px;
        }

        .message.user {
            background: #0d6efd;
            color: white;
            float: right;
            border-bottom-right-radius: 5px;
        }

        .chat-input-area {
            padding: 15px;
            background: #fff;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <!-- Registration Section -->
                <div id="registration-section" class="card shadow-sm">
                    <div class="card-body p-5 text-center">
                        <h2 class="mb-4">Weekly Internship Feedback</h2>
                        <p class="text-muted mb-4">Chat with our AI agent to submit your weekly report.</p>
                        <form id="start-form">
                            <div class="mb-3 text-start">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="internName" required>
                            </div>
                            <div class="mb-3 text-start">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="internEmail" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Start Feedback Session</button>
                        </form>
                    </div>
                </div>

                <!-- Chat Section -->
                <div id="chat-section" class="chat-container shadow hidden">
                    <div class="chat-header">
                        <h4 class="m-0"><i class="fas fa-robot me-2"></i>Feedback Agent</h4>
                    </div>
                    <div class="chat-messages" id="chat-messages">
                        <!-- Messages will appear here -->
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="user-input" class="form-control" placeholder="Type your answer...">
                        <button class="btn btn-primary" id="send-btn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Load Header
        async function loadHeader() {
            try {
                const response = await fetch('template/header.html');
                if (response.ok) {
                    const headerContent = await response.text();
                    document.getElementById('header-placeholder').innerHTML = headerContent;
                }
            } catch (error) {
                console.error("Error loading header:", error);
            }
        }
        loadHeader();

        // Chat Logic
        const startForm = document.getElementById('start-form');
        const registrationSection = document.getElementById('registration-section');
        const chatSection = document.getElementById('chat-section');
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let internData = {};
        let step = 0;

        startForm.addEventListener('submit', (e) => {
            e.preventDefault();
            internData.name = document.getElementById('internName').value;
            internData.email = document.getElementById('internEmail').value;

            registrationSection.classList.add('hidden');
            chatSection.classList.remove('hidden');

            // Initial Greeting
            addMessage('agent', `Hi ${internData.name}! I'm the AI Feedback Agent. I'll ask you a few questions about your week. Ready?`);
        });

        function addMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function handleUserMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';

            // Send to Backend
            try {
                // Show typing indicator? (Optional for now)

                const response = await fetch('/.netlify/functions/feedback-agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        internData: internData,
                        step: step
                    })
                });

                const data = await response.json();

                if (data.reply) {
                    setTimeout(() => addMessage('agent', data.reply), 500);
                    step = data.nextStep;
                }

                if (data.complete) {
                    userInput.disabled = true;
                    sendBtn.disabled = true;
                }

            } catch (error) {
                console.error('Error:', error);
                addMessage('agent', 'Sorry, I encountered an error. Please try again.');
            }
        }

        sendBtn.addEventListener('click', handleUserMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleUserMessage();
        });

    </script>
</body>

</html>
