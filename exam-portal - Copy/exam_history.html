<!-- ALL CSS INLINE (NO EXTERNAL FILE NEEDED) -->
<style>
        body {
            background-color: #f1f6fb;
            font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .cp-page-section {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, .08);
        }
        .cp-page-section__header {
            /* Make header a flex container for alignment */
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding-bottom: 16px;
            margin-bottom: 16px;
            border-bottom: 1px solid #eef2f7;
        }
        .cp-page-section__content p {
            margin-bottom: 1rem;
            color: #374151;
        }
        .cp-page-section__content a {
            color: #1a73e8;
            font-weight: 600;
            text-decoration: none;
        }
        .cp-page-section__content a:hover {
            text-decoration: underline;
        }
        .activity__none {
            text-align: center;
            padding: 48px 16px;
            color: #6b7280;
            font-style: italic;
            background-color: #f9fafb;
            border-radius: 8px;
        }
        .cp-page-section__content--unpadded {
            padding: 0 !important;
        }

        /* HISTORY CARD STYLING */
        .history-grid {
            display: grid;
            gap: 1rem;
            padding: 1rem;
        }
        .history-card {
            background-color: #f9fafb;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            border-left: 4px solid #6c757d;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .history-card.pass {
            border-left-color: #34a853;
        }
        .history-card.fail {
            border-left-color: #ea4335;
        }
        .history-card h4 {
            margin: 0 0 4px 0;
            font-weight: 600;
        }
        .history-card p {
            margin: 0;
            font-size: 0.9rem;
            color: #5f6368;
        }
        .card-main-info {
            flex-grow: 1;
        }
        .card-details {
            display: flex;
            flex-direction: column;
            text-align: right;
            margin-left: 1rem;
            gap: 0.5rem;
        }
        .score-info .score {
            font-size: 1.2rem;
            font-weight: 700;
            color: #111;
        }
        .card-details .btn-certificate {
            background-color: #1a73e8;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .card-details .btn-share-linkedin {
            background-color: #0077B5; /* LinkedIn Blue */
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-block; /* To allow margin */
            font-weight: 600;
        }
        /* Refresh Button Style */
        .btn-refresh {
            background-color: #e8f0fe;
            color: #1a73e8;
            border: 1px solid #1a73e8;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-refresh:hover {
            background-color: #d2e3fc;
        }

        .container {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }
    </style>
<div class="container">
        <main cm-view-outlet="">
            <section>
                <section class="cp-page-section">
                    <article class="cp-page-section__main">
                        <header class="cp-page-section__header"></header>
                        <section class="cp-page-section__content">
                            <div>
                                <p>
                                    Only <strong>completed</strong> exams will appear below and 
                                    may take up to 7 business days to appear.
                                </p>
                                <p>
                                    To register for an exam or get help, please 
                                    <a href="mailto:support@dcinfotech.org.in">email support</a> 
                                    or <a href="/live-chat">start live chat</a>.
                                </p>
                                <p>
                                    <strong><a href="dashboard.html" style="color:#1a73e8;">RETURN TO DASHBOARD</a></strong>
                                </p>
                            </div>
                        </section>
                    </article>
                </section>

                <div class="cp-view__content">
                    <section class="cp-page-section">
                        <article class="cp-page-section__main">
                            <header class="cp-page-section__header">
                                <div>
                                    <h2 class="cp-page-section__title">Exam History</h2>
                                </div>
                                <button id="refreshHistoryBtn" class="btn-refresh">Refresh</button>
                            </header>

                            <!-- Exam history loads here -->
                            <section class="cp-page-section__content cp-page-section__content--unpadded"></section>
                        </article>
                    </section>
                </div>
            </section>
        </main>
    </div>

<!-- INLINE JS -->
<script>
    (async function () {
        const user = JSON.parse(localStorage.getItem('currentUser') || localStorage.getItem('cm_user'));
        const historyContainer = document.querySelector('.cp-page-section__content--unpadded');
        const refreshBtn = document.getElementById('refreshHistoryBtn');
        const SHEETDB_RESULTS_URL = 'https://sheetdb.io/api/v1/43chacbni4gkg';

        if (!user) {
            historyContainer.innerHTML = `<div class="activity__none">Please log in to view your exam history.</div>`; 
            return;
        }

        historyContainer.innerHTML = `<div class="activity__none">Loading your exam history...</div>`;

        const CACHE_KEY = `exam_history_${user.email}`;
        const CACHE_DURATION_MS = 60 * 60 * 1000; // 1 hour

        async function loadHistory(forceRefresh = false) {
            historyContainer.innerHTML = `<div class="activity__none">Loading your exam history...</div>`;

            if (forceRefresh) {
                localStorage.removeItem(CACHE_KEY);
                console.log("Cache cleared for exam history.");
            }

            async function fetchExamHistory() {
                console.log("Fetching fresh exam history from SheetDB...");
                const response = await fetch(SHEETDB_RESULTS_URL);
                if (!response.ok) throw new Error("Failed to load exam history from network.");
                const allExams = await response.json();

                // Save to cache with a timestamp
                const cacheData = {
                    timestamp: Date.now(),
                    exams: allExams
                };
                localStorage.setItem(CACHE_KEY, JSON.stringify(cacheData));
                return allExams;
            }

            async function getExamData() {
                const cachedItem = localStorage.getItem(CACHE_KEY);
                if (cachedItem) {
                    const { timestamp, exams } = JSON.parse(cachedItem);
                    // If cache is recent (less than 1 hour old), use it
                    if (Date.now() - timestamp < CACHE_DURATION_MS) {
                        console.log("Loading exam history from cache.");
                        return exams;
                    }
                }
                // Otherwise, fetch fresh data
                return await fetchExamHistory();
            }

            try {
                const allExams = await getExamData();

                const userHistory = allExams.filter(exam =>
                    exam.UserEmail && user.email &&
                    exam.UserEmail.toLowerCase() === user.email.toLowerCase() &&
                    (exam.Status?.toLowerCase() === 'passed' || exam.Status?.toLowerCase() === 'failed')
                );

                if (userHistory.length === 0) {
                    historyContainer.innerHTML = `<div class="activity__none">You have no completed exams to display.</div>`;
                    return;
                }

                userHistory.sort((a, b) => new Date(b.Timestamp) - new Date(a.Timestamp));

                const html = userHistory.map(exam => {
                    const date = new Date(exam.Timestamp).toLocaleDateString('en-US', {
                        year: 'numeric', month: 'long', day: 'numeric'
                    });

                    const status = exam.Status || "Completed";
                    const klass = status.toLowerCase() === "passed" ? "pass" : "fail";

                    let actionButtons = '';
                    // Generate the certificate button only if the exam is passed
                    if (klass === 'pass') {
                        const certificateUrl = `../internship-offer-letter-web-dev/certified/index.html?name=${encodeURIComponent(exam.UserName)}&email=${encodeURIComponent(exam.UserEmail)}`;
                        
                        // For LinkedIn, we need an absolute URL. Assuming the domain.
                        const absoluteCertificateUrl = new URL(certificateUrl, window.location.origin).href;
                        const shareText = `I'm excited to share that I have successfully passed the ${exam.ExamName} exam! Thanks to DC Cloud Solutions for the opportunity. #GoogleCloud #Certification #DC Cloud Solutions`;
                        const linkedinShareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(absoluteCertificateUrl)}&summary=${encodeURIComponent(shareText)}`;

                        actionButtons = `
                            <a href="${certificateUrl}" target="_blank" class="btn-certificate">Download Certificate</a>
                            <a href="${linkedinShareUrl}" target="_blank" class="btn-share-linkedin" style="margin-top: 8px;">
                                Share on LinkedIn
                            </a>
                        `;
                    }

                    return `
                        <div class="history-card ${klass}">
                            <div class="card-main-info">
                                <h4>${exam.ExamName}</h4>
                                <p>Taken on: ${date}</p>
                            </div>
                            <div class="card-details">
                                <div class="score-info">
                                    <div class="score">${exam.Score || "N/A"}</div>
                                </div>
                                <div class="status">${status}</div>
                                ${actionButtons}
                            </div>
                        </div>
                    `;
                }).join('');

                historyContainer.innerHTML = `<div class="history-grid">${html}</div>`;
            } catch (err) {
                historyContainer.innerHTML = `<div class="activity__none" style="color:red;">Error loading exam history.</div>`;
            }
        }

        refreshBtn.addEventListener('click', () => loadHistory(true));
        loadHistory(); // Initial load
    })();
</script>
