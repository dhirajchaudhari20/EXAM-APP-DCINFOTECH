<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Cloud Event Schedule</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Google Cloud Event Schedule</h1>
  </header>

  <div class="container">
    <h2>Today's Events</h2>
    <div id="event-schedule">
      <!-- Event details will be populated by JavaScript -->
    </div>

    <div class="countdown">
      <p>Next Event Countdown:</p>
      <p id="timer">Loading...</p>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 Google Cloud Academy</p>
  </footer>
<style>body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f4f4f9;
    color: #333;
  }
  
  header {
    background-color: #4CAF50;
    color: white;
    padding: 15px;
    text-align: center;
  }
  
  .container {
    padding: 20px;
  }
  
  h2 {
    text-align: center;
    color: #4CAF50;
  }
  
  .event {
    background-color: white;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 15px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  }
  
  .event h3 {
    margin-top: 0;
    color: #333;
  }
  
  .timer {
    font-size: 18px;
    font-weight: bold;
    color: #ff5722;
    text-align: center;
  }
  
  .event-details {
    margin-top: 10px;
  }
  
  .event-details a {
    color: #4CAF50;
    text-decoration: none;
  }
  
  .event-details a:hover {
    text-decoration: underline;
  }
  
  .countdown {
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    color: #ff5722;
  }
  
  footer {
    text-align: center;
    padding: 10px;
    background-color: #4CAF50;
    color: white;
  }
  
  .event.ended {
    opacity: 0.6;
    text-decoration: line-through;
  }</style>
  <script></script>
  <script src="script.js"></script>
</body>
</html>
