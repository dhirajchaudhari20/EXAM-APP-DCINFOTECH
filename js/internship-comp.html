<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internship Submissions</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fa;
      padding: 20px;
      margin: 0;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
      font-weight: 700;
      
      color: #1f2937;
    }
    #controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    #searchBox {
      flex: 1;
      max-width: 400px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    #downloadPDF {
      background: #007bff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }
    #downloadPDF:hover {
      background: #0056b3;
    }
    #loader {
      display: none;
      text-align: center;
      margin-bottom: 20px;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #007bff;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 1s linear infinite;
      margin: auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .record {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
    }
    .record-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .field {
      font-size: 14px;
      background: #f9fafc;
      padding: 10px;
      border-radius: 6px;
    }
    .field strong {
      color: #333;
      display: block;
      margin-bottom: 3px;
    }
    .actions {
      margin-top: 15px;
      text-align: right;
    }
    .btn {
      background: #10b981;
      color: white;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }
    .btn:hover {
      background: #059669;
    }
  </style>
</head>
<body>

  <!-- Normal Content (No password / no hack screen) -->
  <div id="protectedContent">
    <h1>📑 Internship Submissions</h1>

    <div id="controls">
      <input type="text" id="searchBox" placeholder="Search by name, email, or position...">
      <button id="downloadPDF">⬇️ Download as PDF</button>
    </div>

    <div id="loader"><div class="spinner"></div><p>Loading...</p></div>
    <div id="records"></div>
  </div>

  <script>
    // ===== Data Rendering =====
    let allData = [];
    let filteredData = [];

    async function fetchRecords() {
      showLoader(true);
      try {
        const res = await fetch("https://sheetdb.io/api/v1/5apw0wt6xer1q"); 
        if (!res.ok) throw new Error("Failed to fetch data");
        allData = await res.json();
        filteredData = allData;
        renderRecords(filteredData);
      } catch (err) {
        Swal.fire("Error", "Unable to fetch records!", "error");
        console.error(err);
      } finally {
        showLoader(false);
      }
    }

    function showLoader(show) {
      document.getElementById("loader").style.display = show ? "block" : "none";
    }

    function renderRecords(data) {
      const container = document.getElementById("records");
      container.innerHTML = "";

      if (data.length === 0) {
        container.innerHTML = "<p style='text-align:center;'>No records found.</p>";
        return;
      }

      data.forEach(entry => {
        const card = document.createElement("div");
        card.classList.add("record");

        card.innerHTML = `
          <div class="record-grid">
            <div class="field"><strong>Full Name</strong> ${entry["Full Name"] || "-"}</div>
            <div class="field"><strong>Email Address</strong> ${entry["Email Address"] || "-"}</div>
            <div class="field"><strong>Internship Position</strong> ${entry["Internship Position"] || "-"}</div>
            <div class="field"><strong>Start Date</strong> ${entry["Internship Start Date"] || "-"}</div>
            <div class="field"><strong>End Date</strong> ${entry["Internship End Date"] || "-"}</div>
            <div class="field"><strong>Responsibilities</strong> ${entry["Responsibilities"] || "-"}</div>
            <div class="field"><strong>Projects</strong> ${entry["Projects"] || "-"}</div>
            <div class="field"><strong>Skills Developed</strong> ${entry["Skills Developed"] || "-"}</div>
            <div class="field"><strong>GitHub Links</strong> ${entry["GitHub Links"] || "-"}</div>
            <div class="field"><strong>Hosted Links</strong> ${entry["Hosted Links"] || "-"}</div>
            <div class="field"><strong>Experience</strong> ${entry["Overall Experience"] || "-"}</div>
            <div class="field"><strong>Enjoyment</strong> ${entry["Enjoyment"] || "-"}</div>
            <div class="field"><strong>Suggestions</strong> ${entry["Suggestions"] || "-"}</div>
          </div>
          <div class="actions">
            <button class="btn" onclick="generateCertificate('${entry["Full Name"]}', '${entry["Internship Position"]}', '${entry["Internship End Date"]}')">🎓 Generate Certificate</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    async function generateCertificate(name, position, endDate) {
      Swal.fire({
        title: "Generating Certificate...",
        text: "Please wait while we prepare your completion certificate.",
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
      });

      try {
        const res = await fetch("https://your-backend.com/generate-certificate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, position, endDate })
        });

        if (!res.ok) throw new Error("Failed to generate certificate");
        const data = await res.json();

        Swal.fire({
          icon: "success",
          title: "Certificate Ready!",
          html: `<p>Certificate generated for <b>${name}</b></p>
                 <a href="${data.certificateUrl}" target="_blank" style="color:#007bff;">Download Certificate</a>`,
        });

      } catch (err) {
        Swal.fire("Error", "Could not generate certificate.", "error");
        console.error(err);
      }
    }

    // ===== Search & PDF Export =====
    document.addEventListener("DOMContentLoaded", () => {
      fetchRecords();

      const searchBox = document.getElementById("searchBox");
      if (searchBox) {
        searchBox.addEventListener("input", function() {
          const term = this.value.toLowerCase();
          showLoader(true);
          setTimeout(() => {
            filteredData = allData.filter(entry =>
              JSON.stringify(entry).toLowerCase().includes(term)
            );
            renderRecords(filteredData);
            showLoader(false);
          }, 400);
        });
      }

      const pdfBtn = document.getElementById("downloadPDF");
      if (pdfBtn) {
        pdfBtn.addEventListener("click", function() {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ unit: "pt", format: "a4" });
          let y = 20;

          filteredData.forEach((entry, idx) => {
            doc.setFont("helvetica", "bold");
            doc.text(`Internship Submission ${idx+1}`, 20, y);
            y += 18;

            doc.setFont("helvetica", "normal");
            const details = `
Name: ${entry["Full Name"] || "-"}
Email: ${entry["Email Address"] || "-"}
Position: ${entry["Internship Position"] || "-"}
Start Date: ${entry["Internship Start Date"] || "-"}
End Date: ${entry["Internship End Date"] || "-"}
Responsibilities: ${entry["Responsibilities"] || "-"}
Projects: ${entry["Projects"] || "-"}
Skills: ${entry["Skills Developed"] || "-"}
GitHub: ${entry["GitHub Links"] || "-"}
Hosted Links: ${entry["Hosted Links"] || "-"}
Experience: ${entry["Overall Experience"] || "-"}
Enjoyment: ${entry["Enjoyment"] || "-"}
Suggestions: ${entry["Suggestions"] || "-"}
            `;
            const split = doc.splitTextToSize(details, 550);
            split.forEach(line => {
              doc.text(line, 20, y);
              y += 14;
              if (y > 780) { 
                doc.addPage();
                y = 20;
              }
            });
            y += 10;
          });

          doc.save("internship_submissions.pdf");
        });
      }
    });
  </script>
</body>
</html>
