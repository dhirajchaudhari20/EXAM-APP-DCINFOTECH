    .btn-refresh {

    .btn-refresh:hover {
        background-color: #d2e3fc;
    }

    .container {
        padding-top: 2rem;
        padding-bottom: 2rem;
    }

    /* Skeleton Loader Styles Inline */
    .skeleton {
        background: #e0e0e0;
        border-radius: 4px;
        position: relative;
        overflow: hidden;
    }

    .skeleton::after {
        content: "";
        display: block;
        position: absolute;
        top: 0;
        left: -150px;
        height: 100%;
        width: 150px;
        background: linear-gradient(to right, transparent 0%, rgba(255, 255, 255, 0.3) 50%, transparent 100%);
        animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
        0% {
            left: -150px;
        }

        100% {
            left: 100%;
        }

    .skeleton-card {
        height: 100px;
        width: 100%;
        border-radius: 8px;

<!-- INLINE JS -->
<script>
    (async function () {
        const user = JSON.parse(localStorage.getItem('currentUser') || localStorage.getItem('cm_user'));
        const historyContainer = document.querySelector('.cp-page-section__content--unpadded');
        const refreshBtn = document.getElementById('refreshHistoryBtn');
        const SHEETDB_RESULTS_URL = 'https://dc-infotechpvt-1-d1a4b-default-rtdb.firebaseio.com/exam_results';

        if (!user) {
            historyContainer.innerHTML = `<div class="activity__none">Please log in to view your exam history.</div>`;
            return;
        }

        historyContainer.innerHTML = `
          <div class="history-grid">
             <div class="history-card skeleton skeleton-card"></div>
             <div class="history-card skeleton skeleton-card"></div>
             <div class="history-card skeleton skeleton-card"></div>
          </div>
        `;

        const CACHE_KEY = `exam_history_${user.email}`;
        const CACHE_DURATION_MS = 60 * 60 * 1000; // 1 hour

        async function loadHistory(forceRefresh = false) {
            historyContainer.innerHTML = `
              <div class="history-grid">
                 <div class="history-card skeleton skeleton-card"></div>
                 <div class="history-card skeleton skeleton-card"></div>
                 <div class="history-card skeleton skeleton-card"></div>
              </div>
            `;

            if (forceRefresh) {
                localStorage.removeItem(CACHE_KEY);
                console.log("Cache cleared for exam history.");
            }

            async function fetchExamHistory() {
                console.log("Fetching fresh exam history from Firebase API...");
                const response = await fetch(`${SHEETDB_RESULTS_URL}.json`);
                if (!response.ok) throw new Error("Failed to load exam history from network.");
                const allData = await response.json();
                const allExams = allData ? Object.values(allData) : [];

                // Save to cache with a timestamp
                const cacheData = {
                    timestamp: Date.now(),
                    exams: allExams
                };
                localStorage.setItem(CACHE_KEY, JSON.stringify(cacheData));
                return allExams;
            }

            async function getExamData() {
                const cachedItem = localStorage.getItem(CACHE_KEY);
                if (cachedItem) {
                    const { timestamp, exams } = JSON.parse(cachedItem);
                    // If cache is recent (less than 1 hour old), use it
                    if (Date.now() - timestamp < CACHE_DURATION_MS) {
                        console.log("Loading exam history from cache.");
                        return exams;
                    }
                }
                // Otherwise, fetch fresh data
                return await fetchExamHistory();
            }

            try {
                const allExams = await getExamData();

                const userHistory = allExams.filter(exam =>
                    exam.UserEmail && user.email &&
                    exam.UserEmail.toLowerCase() === user.email.toLowerCase() &&
                    (exam.Status?.toLowerCase() === 'passed' || exam.Status?.toLowerCase() === 'failed')
                );

                if (userHistory.length === 0) {
                    historyContainer.innerHTML = `<div class="activity__none">You have no completed exams to display.</div>`;
                    return;
                }

                userHistory.sort((a, b) => new Date(b.Timestamp) - new Date(a.Timestamp));

                const html = userHistory.map(exam => {
                    const date = new Date(exam.Timestamp).toLocaleDateString('en-US', {
                        year: 'numeric', month: 'long', day: 'numeric'
                    });

                    const status = exam.Status || "Completed";
                    const klass = status.toLowerCase() === "passed" ? "pass" : "fail";

                    let actionButtons = '';

                    if (klass.toLowerCase() === 'pass') { // Only passing exams get certificate options
                        let directCertImage = null;
                        let isExternalLink = false;

                        // Check if natively generated certificate link exists first
                        if (exam.CertificateLink && typeof exam.CertificateLink === 'string' && exam.CertificateLink.trim() !== '') {
                            directCertImage = exam.CertificateLink.trim();
                            isExternalLink = true;
                        } else if (typeof nameInfoMapping !== 'undefined') {
                            // Fallback: Check if certificate exists in mapping
                            const normalizedUserName = (exam.UserName || '').trim().toLowerCase();
                            // Find matching key (case-insensitive)
                            const nameKey = Object.keys(nameInfoMapping).find(
                                key => key.trim().toLowerCase() === normalizedUserName
                            );

                            if (nameKey) {
                                const { image } = nameInfoMapping[nameKey];
                                directCertImage = image && typeof image === 'string' ? image.split(',')[0] : null;
                            }
                        }

                        if (directCertImage) {
                            // OPTION A: Certificate Found
                            const filename = `${(exam.UserName || 'Certificate').replace(/\\s+/g, '_')}_Certificate.pdf`;
                            let certificateBtn = '';
                            let absoluteCertificateUrl = '';

                            if (isExternalLink) {
                                certificateBtn = `
                                    <a href="${directCertImage}" target="_blank" class="btn-certificate" style="border:none; cursor:pointer; font-family:inherit; display:inline-block; margin-bottom:4px;">Download / View</a>
                                `;
                                absoluteCertificateUrl = directCertImage;
                            } else {
                                certificateBtn = `
                                    <button onclick="downloadAsPDF('${directCertImage}', '${filename}')" class="btn-certificate" style="border:none; cursor:pointer; font-family:inherit; display:inline-block; margin-bottom:4px;">Download PDF</button>
                                    <a href="../internship-offer-letter-web-dev/certified/view.html?name=${encodeURIComponent(exam.UserName)}\&email=${encodeURIComponent(exam.UserEmail)}" target="_blank" class="btn-certificate" style="background-color:#fff; color:#1a73e8; border:1px solid #1a73e8; display:inline-block; margin-bottom:4px;">View</a>
                                `;
                                const portalUrl = `../internship-offer-letter-web-dev/certified/index.html?name=${encodeURIComponent(exam.UserName)}\&email=${encodeURIComponent(exam.UserEmail)}`;
                                absoluteCertificateUrl = new URL(portalUrl, window.location.origin).href;
                            }

                            // LinkedIn Share
                            const shareText = `I'm excited to share that I have successfully passed the ${exam.ExamName} exam! Thanks to DC Cloud Solutions for the opportunity. #GoogleCloud #Certification #DC Cloud Solutions`;
                            const linkedinShareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(absoluteCertificateUrl)}\&summary=${encodeURIComponent(shareText)}`;

                            actionButtons = `
                                ${certificateBtn}
                                <a href="${linkedinShareUrl}" target="_blank" class="btn-share-linkedin" style="margin-top: 4px;">Share on LinkedIn</a>
                            `;
                        } else {
                            // OPTION B: Passed but Certificate NOT Found yet
                            actionButtons = `
                                <div style="margin-top: 8px; font-size: 0.85rem; color: #ea4335; background-color: #fce8e6; padding: 8px; border-radius: 4px; border: 1px solid #fce8e6;">
                                    <strong>Certificate Processing</strong><br>
                                    Your certificate is correctly generated but not yet uploaded. It typically takes <strong>7 working days</strong> to appear here.
                                </div>
                            `;
                        }
                    }

                    // Return the card HTML
                    return `
                        <div class="history-card ${klass}">
                            <div class="card-main-info">
                                <h4>${exam.ExamName}</h4>
                                <p>Taken on: ${date}</p>
                            </div>
                            <div class="card-details">
                                <div class="score-info">
                                    <div class="score">${exam.Score || "N/A"}</div>
                                </div>
                                <div class="status">${status}</div>
                                ${actionButtons}
                            </div>
                        </div>
                    `;
                }).join('');

                historyContainer.innerHTML = `<div class="history-grid">${html}</div>`;
            } catch (err) {
                historyContainer.innerHTML = `<div class="activity__none" style="color:red;">Error loading exam history.</div>`;
            }
        }

        refreshBtn.addEventListener('click', () => loadHistory(true));
        loadHistory(); // Initial load
    })();
</script>
