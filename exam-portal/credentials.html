<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Credentials</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Google+Sans:wght@700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --blue-600: #1a73e8;
      --blue-700: #185abc;
      --grey-100: #f8f9fa;
      --grey-200: #e9ecef;
      --grey-700: #495057;
      --grey-800: #343a40;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.1);
      --radius-md: 8px;
      --radius-lg: 12px;
      --success-green: #34a853;
    }

    body {
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      background-color: var(--grey-100);
      color: var(--grey-800);
      margin: 0;
      padding: 0;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1100px;
      padding: 2rem;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-family: 'Google Sans', sans-serif;
      font-size: 2.5rem;
      color: var(--blue-600);
      margin-bottom: 0.5rem;
    }

    header p {
      font-size: 1.1rem;
      color: var(--grey-700);
      max-width: 600px;
      margin: 0 auto;
    }

    .credentials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .credential-card {
      background-color: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border-top: 4px solid var(--success-green);
      position: relative;
      overflow: hidden;
    }

    .credential-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    }

    .badge-icon {
      width: 100px;
      height: 100px;
      margin-bottom: 1.5rem;
      object-fit: contain;
    }

    .credential-card h3 {
      font-family: 'Google Sans', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      color: var(--grey-800);
    }

    .credential-meta {
      font-size: 0.9rem;
      color: var(--grey-700);
      margin-bottom: 1.5rem;
      width: 100%;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.25rem;
      padding: 0.25rem 0;
      border-bottom: 1px solid var(--grey-100);
    }

    .meta-row:last-child {
      border-bottom: none;
    }

    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .status-active {
      background-color: #e6f4ea;
      color: var(--success-green);
    }

    .btn-group {
      display: flex;
      gap: 0.5rem;
      width: 100%;
    }

    .btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 1rem;
      border-radius: var(--radius-md);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      transition: background-color 0.2s ease;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .btn-primary {
      background-color: var(--blue-600);
      color: #fff;
    }

    .btn-primary:hover {
      background-color: var(--blue-700);
    }

    .btn-outline {
      background-color: transparent;
      border-color: var(--grey-200);
      color: var(--grey-700);
    }

    .btn-outline:hover {
      background-color: var(--grey-100);
      color: var(--blue-600);
      border-color: var(--blue-600);
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      background-color: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      grid-column: 1 / -1;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>My Credentials</h1>
      <p>View and manage your active certifications and digital badges.</p>
    </header>

    <main>
      <div class="credentials-grid" id="credentials-container">
        <!-- Credentials will be loaded here dynamically by js/credentials.js -->
        <div class="empty-state">
          <p>Loading credentials...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="js/credentials.js"></script>
  <script>
    // Ensure render is called when this content is loaded
    if (window.renderCredentials) {
      window.renderCredentials();
    }
  </script>
  <script src="js/security.js"></script>
</body>

</html>
