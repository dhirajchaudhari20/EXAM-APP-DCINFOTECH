<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Exam Results - DC Cloud Solutions</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/notiflix@3.2.5/dist/notiflix-aio-3.2.5.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #1a73e8;
            --primary-hover: #1557b0;
            --bg-body: #f1f6fb;
            --bg-card: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --success: #34a853;
            --danger: #ea4335;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 24px;
            margin-bottom: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-outline:hover {
            background-color: #e8f0fe;
        }

        /* Table Styles */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th {
            text-align: left;
            padding: 12px 16px;
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f9fafb;
        }

        /* Status Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.pass {
            background-color: #dcfce7;
            color: #166534;
        }

        .badge.fail {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .loading-state {
            text-align: center;
            padding: 48px;
            color: var(--text-muted);
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .score-cell {
            font-weight: 600;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <div class="header">
                <h1><i data-lucide="clipboard-list"></i> All Exam Results</h1>
                <div>
                    <button id="refreshBtn" class="btn btn-outline">
                        <i data-lucide="refresh-cw"></i> Refresh Data
                    </button>
                    <a href="dashboard.html" class="btn">
                        <i data-lucide="layout-dashboard"></i> Back to Dashboard
                    </a>
                </div>
            </div>

            <div class="table-container">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th onclick="sortTable(0)">Timestamp</th>
                            <th onclick="sortTable(1)">Candidate Name</th>
                            <th onclick="sortTable(2)">Email</th>
                            <th onclick="sortTable(3)">Exam Name</th>
                            <th onclick="sortTable(4)">Score</th>
                            <th onclick="sortTable(5)">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="6" class="loading-state">
                                <i data-lucide="loader-2" class="spinner"
                                    style="width: 32px; height: 32px; margin-bottom: 12px;"></i><br>
                                Fetching data from API...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p id="recordCount" style="margin-top: 16px; color: var(--text-muted); font-size: 0.9rem;"></p>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        const CACHE_KEY = 'exam_results_all';
        const CACHE_DURATION_MS = 60 * 60 * 1000; // 1 hour

        async function fetchData(forceRefresh = false) {
            // Show loading state
            tableBody.innerHTML = `
            <tr>
                <td colspan="6" class="loading-state">
                    <div style="display:flex; flex-direction:column; align-items:center;">
                        <i data-lucide="loader-2" class="spinner" style="width: 32px; height: 32px; margin-bottom: 12px; color: var(--primary);"></i>
                        Fetching results...
                    </div>
                </td>
            </tr>
        `;
            lucide.createIcons();

            try {
                if (forceRefresh === true) {
                    localStorage.removeItem(CACHE_KEY);
                }

                const cachedItem = localStorage.getItem(CACHE_KEY);
                if (cachedItem) {
                    const { timestamp, data } = JSON.parse(cachedItem);
                    if (Date.now() - timestamp < CACHE_DURATION_MS) {
                        console.log("Loading all exam results from cache.");
                        renderTable(data);
                        return;
                    }
                }

                console.log("Fetching fresh results from SheetDB...");
                const response = await fetch(SHEETDB_API_URL);
                if (!response.ok) throw new Error(`API Error: ${response.statusText}`);

                const data = await response.json();

                // Save to cache
                localStorage.setItem(CACHE_KEY, JSON.stringify({
                    timestamp: Date.now(),
                    data: data
                }));

                renderTable(data);
                Notiflix.Notify.success(`Successfully loaded ${data.length} records.`);
            } catch (error) {
                console.error('Fetch error:', error);
                tableBody.innerHTML = `
                <tr>
                    <td colspan="6" class="loading-state" style="color: var(--danger);">
                        <i data-lucide="alert-circle" style="width: 32px; height: 32px; margin-bottom: 12px;"></i><br>
                        Failed to load data. Please try again.<br>
                        <small>${error.message}</small>
                    </td>
                </tr>
            `;
                lucide.createIcons();
                Notiflix.Notify.failure('Failed to fetch data.');
            }
        }

        function renderTable(data) {
            if (!data || data.length === 0) {
                tableBody.innerHTML = `
                <tr>
                    <td colspan="6" class="loading-state">No records found.</td>
                </tr>
            `;
                recordCountProps.textContent = '0 total records';
                return;
            }

            // Sort by Timestamp descending (newest first) by default
            data.sort((a, b) => new Date(b.Timestamp) - new Date(a.Timestamp));

            const rows = data.map(record => {
                const date = record.Timestamp ? new Date(record.Timestamp).toLocaleString() : 'N/A';
                const status = record.Status || 'Unknown';
                const statusClass = status.toLowerCase() === 'passed' ? 'pass' : (status.toLowerCase() === 'failed' ? 'fail' : '');

                return `
                <tr>
                    <td><span style="font-size: 0.85rem; color: #555;">${date}</span></td>
                    <td style="font-weight: 500;">${record.UserName || 'N/A'}</td>
                    <td>${record.UserEmail || 'N/A'}</td>
                    <td>${record.ExamName || 'N/A'}</td>
                    <td class="score-cell">${record.Score || '-'}</td>
                    <td><span class="badge ${statusClass}">${status}</span></td>
                </tr>
            `;
            }).join('');

            tableBody.innerHTML = rows;
            recordCountProps.textContent = `${data.length} total records retrieved`;
            lucide.createIcons(); // Refresh icons if any added essentially
        }

        refreshBtn.addEventListener('click', () => fetchData(true));

        // Initial Load
        document.addEventListener('DOMContentLoaded', fetchData);
    </script>

</body>

</html>
