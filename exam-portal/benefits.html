<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benefits & Rewards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Google+Sans:wght@700&display=swap"
    rel="stylesheet">
  <!-- SweetAlert2 for alerts -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --blue-600: #1a73e8;
      --blue-700: #185abc;
      --grey-100: #f8f9fa;
      --grey-200: #e9ecef;
      --grey-700: #495057;
      --grey-800: #343a40;
      --success-green: #34a853;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.1);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      background-color: var(--grey-100);
      color: var(--grey-800);
      margin: 0;
      padding: 0;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1100px;
      padding: 2rem;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-family: 'Google Sans', sans-serif;
      font-size: 2.5rem;
      color: var(--blue-600);
      margin-bottom: 0.5rem;
    }

    header p {
      font-size: 1.1rem;
      color: var(--grey-700);
      max-width: 600px;
      margin: 0 auto;
    }

    /* Progress Section */
    .progress-card {
      background-color: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 2rem;
      margin-bottom: 3rem;
      border-left: 6px solid var(--blue-600);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .progress-header h2 {
      font-family: 'Google Sans', sans-serif;
      margin: 0 0 0.5rem 0;
      color: var(--grey-800);
    }

    .badge-count {
      font-size: 2rem;
      font-weight: 700;
      color: var(--blue-600);
      font-family: 'Google Sans', sans-serif;
    }

    .progress-bar-bg {
      background-color: var(--grey-200);
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .progress-bar-fill {
      background-color: var(--success-green);
      height: 100%;
      transition: width 1s ease-in-out;
    }

    .progress-footer {
      font-size: 0.95rem;
      color: var(--grey-700);
    }

    /* Benefits Grid */
    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }

    .benefit-card {
      background-color: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease;
    }

    .benefit-card:hover {
      transform: translateY(-5px);
    }

    .card-image {
      height: 200px;
      background-color: var(--grey-100);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .lock-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .lock-overlay svg {
      width: 48px;
      height: 48px;
    }

    .card-content {
      padding: 1.5rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .tier-badge {
      display: inline-block;
      background-color: var(--blue-600);
      color: #fff;
      padding: 0.25rem 0.75rem;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      align-self: flex-start;
      margin-bottom: 0.75rem;
    }

    .benefit-card.locked .tier-badge {
      background-color: var(--grey-700);
    }

    .benefit-card h3 {
      font-family: 'Google Sans', sans-serif;
      margin: 0 0 0.5rem 0;
      font-size: 1.25rem;
    }

    .item-list {
      list-style: none;
      padding: 0;
      margin: 1rem 0;
      flex-grow: 1;
    }

    .item-list li {
      display: flex;
      align-items: center;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: var(--grey-700);
    }

    .btn {
      display: block;
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: var(--radius-md);
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: background-color 0.2s;
    }

    .btn-primary {
      background-color: var(--blue-600);
      color: #fff;
    }

    .btn-primary:hover {
      background-color: var(--blue-700);
    }

    .btn-disabled {
      background-color: var(--grey-200);
      color: var(--grey-700);
      cursor: not-allowed;
    }

    .text-center {
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Benefits & Rewards</h1>
      <p>Earn certifications, unlock tiers, and claim exclusive swag from DC Cloud Solutions and Google Cloud.</p>
    </header>

    <main>
      <div id="progress-container">
        <!-- Progress bar loaded here -->
        <div class="progress-card">
          <p class="text-center">Loading your progress...</p>
        </div>
      </div>

      <div class="benefits-grid" id="benefits-container">
        <!-- Benefits cards loaded here -->
      </div>
    </main>
  </div>

  <!-- Claim Reward Modal -->
  <div id="claimModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-[100]">
    <div class="bg-white rounded-xl max-w-md w-full mx-4 overflow-hidden shadow-2xl transform transition-all">
      <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-6 text-white">
        <div class="flex justify-between items-center">
          <h3 class="text-xl font-bold">Claim Your Reward</h3>
          <button onclick="closeClaimModal()" class="text-white hover:text-gray-200 focus:outline-none">
            <i data-lucide="x" class="w-6 h-6"></i>
          </button>
        </div>
        <p class="text-blue-100 text-sm mt-1">Congratulations on your achievement!</p>
      </div>

      <div class="p-6">
        <form action="https://formsubmit.co/support@dcinfotech.org.in" method="POST" class="space-y-4">
          <!-- Hidden Configuration Fields -->
          <input type="hidden" name="_subject" value="New Reward Claim Request">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_template" value="table">
          <input type="hidden" name="_next" value="https://dcinfotech-office.github.io/exam-portal/benefits.html">

          <!-- Hidden Data Fields -->
          <input type="hidden" id="claimTier" name="tier_level">
          <input type="hidden" id="claimTierName" name="tier_name">

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Select Your Reward (Choose 1)</label>
            <select id="claimItemSelect" name="selected_item" required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors">
              <option value="">-- Select an Item --</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
            <input type="text" name="full_name" required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors"
              placeholder="Enter your full name">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input type="email" name="email" required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors"
              placeholder="Enter your email">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Contact Number</label>
            <input type="tel" name="phone" required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors"
              placeholder="Enter your phone number">
          </div>

          <button type="submit"
            class="w-full bg-gradient-to-r from-blue-600 to-indigo-700 text-white font-bold py-3 rounded-lg hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200 mt-2">
            Submit Claim
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/benefits.js"></script>
  <script>
    if (window.renderBenefits) {
      window.renderBenefits();
    }
  </script>
  <script src="js/security.js"></script>
</body>

</html>
