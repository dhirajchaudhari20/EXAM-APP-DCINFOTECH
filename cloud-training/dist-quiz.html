<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Computing - Gamified Quiz</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/dist-quiz.css">
</head>
<body>
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <div class="quiz-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen start-screen active">
            <div style="font-size: 4rem; margin-bottom: 20px;">🎮</div>
            <h1>Distributed Quiz</h1>
            <p>Test your knowledge on CAP, Paxos, and Lamport Clocks. <br> 3 Lives. 10 Questions. Let's go!</p>
            <div class="name-input-wrapper">
                <input type="text" id="player-name" class="name-input" placeholder="Enter your name to begin..." maxlength="30" autocomplete="off" />
                <span id="name-error" class="name-error"></span>
            </div>
            <button class="btn-primary" onclick="startQuiz()">START GAME</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <div class="stats-group">
                    <div class="stat-item score-container">
                        <i class="fas fa-trophy"></i> <span id="score">0</span>
                    </div>
                    <div class="stat-item lives-container">
                        <span id="lives">❤️❤️❤️</span>
                    </div>
                </div>
                <div class="stat-item" style="color: #94a3b8;">
                    <i class="fas fa-clock"></i> <span id="player-name-display">DCS-QUIZ</span>
                </div>
            </div>

            <div class="progress-wrapper">
                <div id="progress-bar" class="progress-bar"></div>
            </div>

            <div id="question-text" class="question-text">
                Loading question...
            </div>

            <div id="options-grid" class="options-grid">
                <!-- Options injected by JS -->
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen" style="text-align: center;">
            <div style="font-size: 4rem; margin-bottom: 20px;">🏆</div>
            <h2 id="result-message" style="margin-bottom: 10px;">Quiz Complete!</h2>
            <div style="font-size: 1.2rem; color: #94a3b8; margin-bottom: 30px;">
                Final Score: <span id="final-score" style="color: var(--primary); font-weight: 800;">0</span>
            </div>

            <!-- Leaderboard -->
            <div class="leaderboard-section">
                <h3 class="leaderboard-title"><i class="fas fa-list-ol"></i> All Participants</h3>
                <div id="leaderboard-list" class="leaderboard-list">
                    <div class="leaderboard-loading"><i class="fas fa-spinner fa-spin"></i> Loading scores...</div>
                </div>
            </div>

            <button class="btn-primary" style="margin-top: 24px;" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <!-- Meme Overlay -->
    <div id="meme-overlay" class="meme-overlay">
        <img id="meme-img" src="" alt="Meme" class="meme-img">
    </div>

    <!-- Firebase Realtime Database SDK -->
    <script type="module" src="js/dist-quiz.js"></script>
</body>
</html>
