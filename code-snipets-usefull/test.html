<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Registration Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
</head>
<body>
    <div class="modal fade cv-up" id="jobModal" tabindex="-1" aria-labelledby="jobModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="jobModalLabel">Apply For Internship</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="jobApplicationForm">
                        <div class="mb-3">
                            <label for="fullName" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" placeholder="Enter your email address" required>
                        </div>
                        <div class="mb-3">
                            <label for="phoneNumber" class="form-label">Phone Number</label>
                            <input type="text" class="form-control" id="phoneNumber" placeholder="Enter your phone number" required>
                        </div>
                        <div class="mb-3">
                            <label for="experience" class="form-label">Experience</label>
                            <select class="form-select" id="experience" required>
                                <option value="" disabled selected>Select experience level</option>
                                <option value="0">Fresher</option>
                                <option value="1">1 Year</option>
                                <option value="2">2 Years</option>
                                <option value="3">3 Years</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="cvUpload" class="form-label">Upload Your CV</label>
                            <input class="form-control" type="file" id="cvUpload" accept=".pdf,.doc,.docx" required>
                        </div>
                        <div class="mb-3">
                            <label for="paymentDetails" class="form-label">Payment Details</label>
                            <p>Please complete your payment by clicking the link below:</p>
                            <a href="upi://pay?pa=dhirajviva14@oksbi&pn=DhirajViva&mc=0000&tid=1234567890&tt=P&am=100.00&cu=INR&url=" target="_blank" class="btn btn-primary">Pay ₹100 Now</a>
                        </div>
                        <div class="mb-3">
                            <label for="paymentProof" class="form-label">Upload Proof of Payment</label>
                            <input class="form-control" type="file" id="paymentProof" accept=".jpg,.jpeg,.png,.pdf" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary" id="applyJobButton">Apply for Internship</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('applyJobButton').addEventListener('click', function(event) {
            event.preventDefault(); // Prevent form from submitting in the traditional way

            const form = document.getElementById('jobApplicationForm');
            
            // Simple form validation
            if (form.checkValidity()) {
                // Show SweetAlert2 confirmation
                Swal.fire({
                    title: 'Application Submitted!',
                    html: 'Thank you for applying. We will review your application and get back to you soon. Please complete the payment and upload proof of payment. Thank you!',
                    icon: 'success',
                    confirmButtonText: 'Okay'
                }).then((result) => {
                    if (result.isConfirmed) {
                        form.reset(); // Reset the form fields
                        // Close the modal
                        const modal = bootstrap.Modal.getInstance(document.getElementById('jobModal'));
                        modal.hide();
                    }
                });

            } else {
                // Show SweetAlert2 error
                Swal.fire({
                    title: 'Oops!',
                    text: 'Please fill in all required fields.',
                    icon: 'error',
                    confirmButtonText: 'Okay'
                });
            }
        });
    </script>
</body>
</html>
