<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results History - MacroAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 16px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .history-details {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .history-macros {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
        }

        .macro-tag {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .back-nav {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
        }

        .back-nav:hover {
            color: var(--text-main);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <a href="index.html" class="back-nav">
            <i class="fas fa-arrow-left"></i> Back to Tracker
        </a>

        <header>
            <h1>Meal <span class="highlight">History</span></h1>
            <p class="subtitle">Your recent logs</p>
        </header>

        <main>
            <div id="loading" class="status-text" style="text-align:center;">Loading history...</div>
            <div id="historyList" class="history-list">
                <!-- Items injected here -->
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, query, orderByChild, limitToLast, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCohKlqNu0I1sXcLW4D_fv-OEw9x0S50q8", // Standard Key
            authDomain: "dc-infotechpvt-1-d1a4b.firebaseapp.com",
            databaseURL: "https://dc-infotechpvt-1-d1a4b-default-rtdb.firebaseio.com",
            projectId: "dc-infotechpvt-1-d1a4b",
            storageBucket: "dc-infotechpvt-1-d1a4b.firebasestorage.app",
            messagingSenderId: "330752838328",
            appId: "1:330752838328:web:1fe0ca04953934d4638703"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const historyList = document.getElementById('historyList');
        const loading = document.getElementById('loading');

        async function loadHistory() {
            try {
                // Get last 20 meals
                const mealsRef = ref(db, 'meals');
                const q = query(mealsRef, limitToLast(20));
                const snapshot = await get(q);

                let html = '';

                if (snapshot.exists()) {
                    let meals = [];
                    snapshot.forEach((child) => {
                        meals.push(child.val());
                    });
                    meals.reverse(); // Show newest first

                    meals.forEach((data) => {
                        const date = data.timestamp ? new Date(data.timestamp).toLocaleString() : 'Unknown Date';
                        // Handle potential undefined foodItems
                        const foodItemsStr = Array.isArray(data.foodItems) ? data.foodItems.join(', ') : 'No items';

                        html += `
                        <div class="history-item">
                            <div class="history-header">
                                <span>${date}</span>
                            </div>
                            <div class="history-details">
                                ${foodItemsStr}
                            </div>
                            <div class="history-macros">
                                <span class="macro-tag" style="color:var(--calories-color)"><i class="fas fa-fire"></i> ${data.macros?.calories || 0}</span>
                                <span class="macro-tag" style="color:var(--protein-color)"><i class="fas fa-drumstick-bite"></i> ${data.macros?.protein || 0}g</span>
                                <span class="macro-tag" style="color:var(--carbs-color)"><i class="fas fa-bread-slice"></i> ${data.macros?.carbs || 0}g</span>
                                <span class="macro-tag" style="color:var(--fats-color)"><i class="fas fa-cheese"></i> ${data.macros?.fats || 0}g</span>
                            </div>
                        </div>
                        `;
                    });
                } else {
                    html = '<p style="text-align:center; color:var(--text-muted)">No meals logged yet.</p>';
                }

                historyList.innerHTML = html;
            } catch (e) {
                console.error("Error loading history:", e);
                historyList.innerHTML = `<p style="color:red; text-align:center;">Error loading details: ${e.message}</p>`;
            } finally {
                if (loading) loading.style.display = 'none';
            }
        }

        loadHistory();
    </script>

    <!-- Goal 20: Creator Footer & Version -->
    <footer class="app-footer">
        <p>Designed & Developed by <strong>Dhiraj Chaudhari</strong></p>
        <p id="app-version-display">v1.0.0</p>
    </footer>

    <script type="module" src="history.js"></script>
</body>

</html>
