<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Sheet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }
        iframe {
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .link-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Embedded Google Sheet</h1>

        <!-- Embedding the Sheet as an iframe -->
        <iframe src="https://sheetdb.io/s/f/d9pp1x50z65m8" width="100%" height="500px"></iframe>

        <div class="link-container">
            <!-- Providing a link to view the Sheet -->
            <p>Or you can <a href="https://sheetdb.io/s/f/d9pp1x50z65m8" target="_blank">click here to view the Sheet</a> in a new tab.</p>
        </div>
    </div>

</body>
</html>
