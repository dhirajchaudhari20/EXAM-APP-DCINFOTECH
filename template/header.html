  <script>
    // Check if user is on the .tech domain
    if (window.location.hostname.includes("dcinfo.tech")) {
      const banner = document.createElement("div");
      banner.innerHTML = `
      <div style="background:#fff3cd; padding:16px; color:#856404; text-align:center; font-family:sans-serif; border:1px solid #ffeeba;">
        <strong>⚠️ Notice:</strong> <code>DC Cloud Solutions.tech</code> will be permanently shut down on <strong>August 1, 2025</strong>.
        <br>Please update your bookmarks to our new domain: 
        <a href="https://dcinfotech.org.in" style="color:#004085; font-weight:bold;">dcinfotech.org.in</a>.
        <br>Redirecting you automatically in <span id="countdown">10</span> seconds...
      </div>
    `;
      document.body.prepend(banner);

      // Optional auto redirect after 10 seconds
      let seconds = 10;
      const countdown = document.getElementById("countdown");
      const timer = setInterval(() => {
        seconds--;
        countdown.innerText = seconds;
        if (seconds <= 0) {
          clearInterval(timer);
          window.location.href = "https://dcinfotech.org.in";
        }
      }, 1000);
    }
  </script>
