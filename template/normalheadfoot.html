<script>
  // Function to set the active link in the navbar based on the URL
  function setActiveNavLink() {
    const currentPath = window.location.pathname.split("/").pop(); // Get the current page filename
    const navLinks = document.querySelectorAll('.nav-link'); // Select all nav links

    navLinks.forEach(link => {
      // Remove 'active' from all links
      link.classList.remove('active');

      // Add 'active' to the link that matches the current path
      if (link.getAttribute('href') === currentPath) {
        link.classList.add('active');
      }
    });
  }

  // Load header and then set the active link
  async function loadHeader() {
    try {
      const response = await fetch('../template/header.html');
      if (response.ok) {
        const headerContent = await response.text();
        document.getElementById('header-placeholder').innerHTML = headerContent;
        setActiveNavLink(); // Call function after header loads
      } else {
        console.error("Failed to load header:", response.statusText);
      }
    } catch (error) {
      console.error("Error loading header:", error);
    }
  }

  loadHeader();
</script>

<!-- JavaScript Function to Handle Form Submission -->
<script>
function submitForm() {
    const fullName = document.getElementById('fullName').value;
    const email = document.getElementById('email').value;
    const subject = document.getElementById('subject').value;
    const message = document.getElementById('message').value;

    if (fullName && email && subject && message) {
        // Assume form submission success for now
        Swal.fire({
            icon: 'success',
            title: 'Message Sent!',
            text: 'Thank you, ' + fullName + '. We will get back to you shortly.',
            confirmButtonText: 'OK'
        }).then(() => {
            // Clear the form after submission
            document.getElementById('fullName').value = '';
            document.getElementById('email').value = '';
            document.getElementById('subject').value = '';
            document.getElementById('message').value = '';
            // Hide the modal
            $('#quickModal').modal('hide');
        });
    } else {
        Swal.fire({
            icon: 'error',
            title: 'Oops...',
            text: 'Please fill in all fields before submitting.',
            confirmButtonText: 'OK'
        });
    }
}
</script>
